<!DOCTYPE html>
<html lang="en">
    <head>
        <title>
            Social Media Feed
        </title>
        <link href="style.css" rel="stylesheet">
    </head>
    <body>

        <header>
            <h1>Social Media Feed</h1>
        </header>

        <main>
            <div class="feed">

                <div class="post">
                    <div class="image-container">
                        <div class="live-badge">LIVE</div>
                        <img class="post-media" src="https://images.unsplash.com/photo-1533037440921-f788628f8d0e?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
                    </div>
                    <div class="post-description">
                        <span class="user">@natgeo </span>Watch this leaf grow and die LIVE!
                    </div>
                </div>

                <div class="post">
                    <div class="image-container">
                        <img class="post-media" src="https://images.unsplash.com/photo-1565064012199-c537fe6fb4b5?q=80&w=627&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
                    </div>
                    <div class="post-description">
                        <span class="user">@profeaaroncalahorra </span>I love my car #teacherlife
                    </div>
                </div>

            </div>

            <div class="ad">
                <p>Suggested for you</p>
                <p>I'm an ad and I will follow you for the rest of your life.</p>
            </div>
        </main>

    </body>
</html>
