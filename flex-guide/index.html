<!DOCTYPE html>
<html>

    <head>
        <title>Flexbox Guide</title>
        <link href="style.css" rel="stylesheet"/>
    </head>

    <body>
        <h1>Flexbox Guide</h1>

        <h2>Enable Flexbox in Parent Container</h2>

        <h3>Display: Flex</h3>
        <div class='container' id='flex'>
            <div class='box'>1</div>
            <div class='box'>2</div>
            <div class='box'>3</div>
        </div>

        <h3>Display: Block (Flexbox is disabled in parent container)</h3>
        <div class='container' id='block'>
            <div class='box'>1</div>
            <div class='box'>2</div>
            <div class='box'>3</div>
        </div>

        <h2>Justify Content</h2>

        <h3>Flex Start</h3>
        <div class='container' id='flexstart'>
            <div class='box'>1</div>
            <div class='box'>2</div>
            <div class='box'>3</div>
        </div>

        <h3>Flex End</h3>
        <div class='container' id='flexend'>
            <div class='box'>1</div>
            <div class='box'>2</div>
            <div class='box'>3</div>
        </div>

        <h3>Center</h3>
        <div class='container' id='center'>
            <div class='box'>1</div>
            <div class='box'>2</div>
            <div class='box'>3</div>
        </div>

        <h3>Space Around</h3>
        <div class='container' id='spacearound'>
            <div class='box'>1</div>
            <div class='box'>2</div>
            <div class='box'>3</div>
        </div>

        <h3>Space Between</h3>
        <div class='container' id='spacebetween'>
            <div class='box'>1</div>
            <div class='box'>2</div>
            <div class='box'>3</div>
        </div>
